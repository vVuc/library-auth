services:

  postgres:
    container_name: db-postgres
    image: postgres:17.5
    env_file:
      - .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PW}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5433:5432"

    restart: always

    volumes:
      - vol_db:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    env_file:
      - .env
    container_name: livraria-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --requirepass ${REDIS_PW} --appendonly yes
#    networks:
#      - livraria-network
volumes:
  vol_db:
  redis_data:

